  body {

  .card {

    border: 2px solid #2b2d6b;

  }

    width: 100%;

    margin-top: 8px;

    border-radius: 6px;
    box-sizing: border-box;
    font-size: 16px;
  }

  button {
    display: block;
    margin: 0 auto 20px auto;
    padding: 10px 25px;
    background: #2b2d6b;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;

  }

  button:hover {
    background: #1c1e4a;

  #result {
    min-height: 24px;

    font-weight: bold;
  }

  .eligible {
    background: #e0f5e0;
    color: #1f7a1f;

  <script>
    function checkEligibility() {
      debugger;
      const ageInput = document.getElementById("age");
      const result = document.getElementById("result");
      const age = parseInt(ageInput.value);

      result.classList.remove("eligible", "not-eligible");

      if (isNaN(age) || ageInput.value.trim() === "") {
        result.textContent = "Please enter a valid age.";
        result.classList.add("not-eligible");
        return;
      }

      if (age < 0 || age > 120) {
        result.textContent = "Please enter a realistic age.";
        result.classList.add("not-eligible");
        return;
      }

      if (age >= 18) {
        result.textContent = "You are eligible to vote!";
        result.classList.add("eligible");
      } else {
        result.textContent = "Sorry, you are underage and not eligible to vote.";
        result.classList.add("not-eligible");
      }
    }
